# ============================================================================
# HybridRAG v3 -- Model Download Manifest (config/model_manifest.yaml)
# ============================================================================
# WHAT: Complete inventory of all AI model weights required by HybridRAG.
# WHY:  pip requirements.txt only covers Python packages. Model weights are
#       separate multi-GB downloads invisible to pip/security scanners.
#       This manifest makes them auditable for security compliance.
# HOW:  Lists every model download with exact name, version, size, vendor,
#       license, download source, and pre-caching instructions.
#
# SECURITY NOTE: All models run 100% locally. No data leaves the machine.
#   - Ollama models: downloaded once via `ollama pull`, stored locally
#   - Embedding model (nomic-embed-text) also served by Ollama
#   - No HuggingFace dependencies for core operation
#
# LAST UPDATED: 2026-02-22
# APPROVED BY: See docs/05_security/ (model audit document)
# ============================================================================

# ============================================================================
# SECTION 1: REQUIRED FOR BASIC OPERATION
# These models MUST be present for the application to function.
# ============================================================================

required:

  # --- Embedding Model (converts text to vectors for search) ---
  - name: "nomic-embed-text"
    type: "embedding"
    vendor: "Nomic AI"
    vendor_country: "USA"
    license: "Apache 2.0"
    size_mb: 274
    dimensions: 768
    download_source: "Ollama (ollama pull nomic-embed-text)"
    ollama_tag: "nomic-embed-text"
    runtime: "Ollama"
    config_key: "embedding.model_name"
    security_controls:
      - "Served locally by Ollama on 127.0.0.1:11434"
      - "No HuggingFace dependency -- no runtime downloads"
      - "Embedder calls Ollama HTTP API (/api/embed) via httpx"
    install_command: "ollama pull nomic-embed-text"
    airgap_transfer: |
      # Copy from home machine to work machine:
      # Source: %USERPROFILE%\.ollama\models\  (entire folder)
      # Dest:   target machine same path
      # The Ollama model store contains all pulled model weights.
    notes: >
      Primary embedding model. Converts document chunks and queries into
      768-dimensional vectors for semantic search. Served by Ollama HTTP API.
      Required for ALL operations (indexing and querying).
      Replaced all-MiniLM-L6-v2 (384d, HuggingFace) in Session 15.

  # --- LLM Model (generates answers from retrieved context) ---
  - name: "phi4-mini"
    type: "llm"
    full_name: "Phi-4-mini (3.8B parameters)"
    vendor: "Microsoft"
    vendor_country: "USA"
    license: "MIT"
    size_mb: 2300
    vram_mb: 5500
    download_source: "Ollama Library"
    download_url: "https://ollama.com/library/phi4-mini"
    ollama_tag: "phi4-mini"
    runtime: "Ollama"
    runtime_url: "https://ollama.com/download/windows"
    config_key: "ollama.model"
    install_command: "ollama pull phi4-mini"
    airgap_transfer: |
      # Export from home machine:
      # Ollama models stored in: %USERPROFILE%\.ollama\models\
      # Copy entire .ollama\models\ folder to work machine same path.
      # Or use: ollama cp phi4-mini <backup-path> (if supported)
    notes: >
      Default offline LLM. Primary model for 7 of 9 job profiles.
      Required for ALL query operations in offline mode.

