# ============================================================================
# SECTION 3: OPTIONAL FEATURE MODELS (disabled by default)
# These are only needed if specific features are enabled in config.
# ============================================================================

optional:

  # --- NLI Model (hallucination guard -- disabled by default) ---
  - name: "cross-encoder/nli-deberta-v3-base"
    type: "nli_cross_encoder"
    vendor: "Microsoft (DeBERTa architecture)"
    vendor_country: "USA"
    license: "MIT"
    size_mb: 440
    download_source: "HuggingFace"
    download_url: "https://huggingface.co/cross-encoder/nli-deberta-v3-base"
    local_cache_path: ".model_cache/nli_model/"
    pip_dependency: "sentence-transformers==2.7.0"
    config_key: "hallucination_guard.nli_model"
    enabled_by_default: false
    enable_config: "hallucination_guard.enabled: true"
    install_command: |
      # One-time download (requires internet):
      $env:HF_HUB_OFFLINE = "0"
      python -c "from sentence_transformers import CrossEncoder; CrossEncoder('cross-encoder/nli-deberta-v3-base')"
      $env:HF_HUB_OFFLINE = "1"
    notes: >
      Natural Language Inference model for hallucination detection.
      Only needed if hallucination_guard.enabled=true in config.
      Disabled by default. 440MB download.

  # --- Reranker Model (reranking -- disabled by default) ---
  - name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    type: "reranker_cross_encoder"
    vendor: "Microsoft"
    vendor_country: "USA"
    license: "MIT"
    size_mb: 80
    download_source: "HuggingFace"
    download_url: "https://huggingface.co/cross-encoder/ms-marco-MiniLM-L-6-v2"
    local_cache_path: ".model_cache/"
    pip_dependency: "sentence-transformers==2.7.0"
    config_key: "retrieval.reranker_model"
    enabled_by_default: false
    enable_config: "retrieval.reranker_enabled: true"
    install_command: |
      # One-time download (requires internet):
      $env:HF_HUB_OFFLINE = "0"
      python -c "from sentence_transformers import CrossEncoder; CrossEncoder('cross-encoder/ms-marco-MiniLM-L-6-v2')"
      $env:HF_HUB_OFFLINE = "1"
    notes: >
      Reranker for improved retrieval accuracy.
      Only needed if retrieval.reranker_enabled=true in config.
      Currently disabled because it degrades injection detection scores.

# ============================================================================
# SECTION 4: RUNTIME DEPENDENCIES (not model weights, but required software)
# ============================================================================

runtime_dependencies:

  - name: "Ollama"
    type: "inference_server"
    vendor: "Ollama Inc."
    vendor_country: "USA"
    license: "MIT"
    minimum_version: "0.7.0"
    download_url: "https://ollama.com/download/windows"
    install_method: "Windows installer (.exe) from ollama.com/download/windows"
    install_powershell: "irm https://ollama.com/install.ps1 | iex"
    config_key: "ollama.base_url"
    default_bind: "http://127.0.0.1:11434"
    security_controls:
      - "Binds to localhost only (127.0.0.1)"
      - "Never exposed to network"
      - "Only loads models from official ollama.com/library"
    notes: >
      Local LLM inference server. Runs all Ollama models listed above.
      Must be installed and running (ollama serve) before launching HybridRAG.
      The installer adds ollama.exe to PATH automatically.

  - name: "Python packages"
    type: "pip_packages"
    manifest: "requirements.txt"
    key_packages:
      - "sentence-transformers==2.7.0  # Loads embedding + cross-encoder models"
      - "torch==2.10.0                 # PyTorch backend for model inference"
      - "transformers==4.57.6          # HuggingFace model loading"
      - "openai==1.45.1                # API client for online mode (pinned, never upgrade to 2.x)"
    install_command: "pip install -r requirements.txt"
    notes: "All Python packages pinned to exact versions in requirements.txt."

# ============================================================================
# SECTION 5: BANNED MODELS (do NOT download or use)
# See docs/05_security/ (model audit document) for full rationale.
# ============================================================================

banned:
  - "Any Qwen model (Alibaba/China)"
  - "Any DeepSeek model (China)"
  - "Any BGE model (BAAI/China, US Entity List)"
  - "Any Llama model (Meta, military use prohibited)"
  - "Any Stella/Jasper embedding (Alibaba GTE architecture)"
  - "mxbai-rerank-v2 (Qwen-2.5 architecture, Alibaba dependency)"
  - "Jina embeddings v3 (non-commercial license)"

# ============================================================================
# SECTION 6: DEPLOYMENT CHECKLIST
# ============================================================================
#
# For air-gapped or restricted machines:
#
# Step 1: Install Python 3.11+ and create venv
#   python -m venv .venv
#   .venv\Scripts\activate
#   pip install -r requirements.txt
#
# Step 2: Install Ollama
#   Download from https://ollama.com/download/windows
#   Run installer, open new terminal, verify: ollama --version
#
# Step 3: Pull required Ollama models (requires internet, one-time)
#   ollama pull phi4-mini              # 2.3 GB -- REQUIRED
#   ollama pull mistral:7b             # 4.1 GB -- optional
#   ollama pull phi4:14b-q4_K_M        # 9.1 GB -- optional
#   ollama pull gemma3:4b              # 3.3 GB -- optional
#   ollama pull mistral-nemo:12b       # 7.1 GB -- optional
#
# Step 4: Cache HuggingFace embedding model (requires internet, one-time)
#   $env:HF_HUB_OFFLINE = "0"
#   python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
#   $env:HF_HUB_OFFLINE = "1"
#
# Step 5: Verify
#   ollama list                        # Should show pulled models
#   python -c "from src.core.embedder import Embedder; e = Embedder(); print(e.dimension)"
#   # Should print: 384
#
# For fully air-gapped transfer (no internet on target):
#   Copy from internet-connected machine:
#   - .model_cache\ folder          -> target .model_cache\
#   - %USERPROFILE%\.ollama\models\ -> target same path
#   - .venv\ folder (or re-install from wheels bundle)
# ============================================================================
