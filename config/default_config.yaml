api:
  api_version: ''
  auth_scheme: ''
  deployment: ''
  endpoint: ''
  max_tokens: 2048
  model: ''
  provider: ''
  temperature: 0.05
  timeout_seconds: 60
chunking:
  chunk_size: 1200
  max_heading_len: 160
  overlap: 200
cost:
  daily_budget_usd: 5.0
  input_cost_per_1k: 0.0015
  output_cost_per_1k: 0.002
  track_enabled: true
embedding:
  batch_size: 64
  device: cpu
  dimension: 768
  model_name: nomic-embed-text
hallucination_guard:
  chunk_prune_k: 3
  enable_dual_path: false
  enabled: false
  failure_action: block
  model_cache_dir: .model_cache
  nli_model: cross-encoder/nli-deberta-v3-base
  shortcircuit_fail: 3
  shortcircuit_pass: 5
  threshold: 0.8
indexing:
  block_chars: 200000
  max_chars_per_file: 2000000
mode: offline
ollama:
  base_url: http://localhost:11434
  context_window: 4096
  keep_alive: -1
  model: phi4-mini
  num_predict: 512
  num_thread: 0
  timeout_seconds: 600
vllm:
  base_url: http://localhost:8000
  model: phi4-mini
  timeout_seconds: 120
  context_window: 16384
  enabled: false
transformers_llm:
  enabled: false
  model: microsoft/phi-4
  max_new_tokens: 2048
  temperature: 0.05
  load_in_4bit: true
  device_map: auto
  trust_remote_code: true
paths:
  database: D:\RAG Indexed Data\hybridrag.sqlite3
  embeddings_cache: D:\RAG Indexed Data\_embeddings
  source_folder: D:\RAG Source Data
setup_complete: true
retrieval:
  hybrid_search: true
  min_chunks: 1
  min_score: 0.1
  reranker_enabled: false
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  reranker_top_n: 20
  rrf_k: 60
  top_k: 5
security:
  audit_logging: true
  pii_sanitization: true
