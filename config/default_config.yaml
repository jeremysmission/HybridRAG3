# Online mode settings (Azure OpenAI / OpenAI cloud endpoints)
api:
  api_version: ''
  auth_scheme: ''
  context_window: 128000
  deployment: ''
  endpoint: ''
  max_tokens: 16384
  model: ''
  provider: ''
  temperature: 0.05
  timeout_seconds: 180
chunking:
  chunk_size: 1200
  max_heading_len: 160
  overlap: 200
cost:
  daily_budget_usd: 5.0
  input_cost_per_1k: 0.0015
  output_cost_per_1k: 0.002
  track_enabled: true
# Embedding model settings (Ollama nomic-embed-text)
embedding:
  batch_size: 16
  device: cpu
  dimension: 768
  model_name: nomic-embed-text
hallucination_guard:
  chunk_prune_k: 3
  enable_dual_path: false
  enabled: false
  failure_action: block
  model_cache_dir: .model_cache
  nli_model: ''
  shortcircuit_fail: 3
  shortcircuit_pass: 5
  threshold: 0.8
indexing:
  block_chars: 200000
  max_chars_per_file: 2000000
mode: offline
# Offline mode settings (local Ollama LLM inference)
ollama:
  base_url: http://127.0.0.1:11434
  context_window: 4096
  keep_alive: -1
  model: phi4-mini
  num_predict: 512
  num_thread: 0
  timeout_seconds: 180
# File system paths for data storage
paths:
  database: "D:\\RAG Indexed Data\\hybridrag.sqlite3"
  embeddings_cache: "D:\\RAG Indexed Data\\_embeddings"
  source_folder: "D:\\RAG Source Data"
  download_folder: "D:\\RAG Source Data"
  transfer_source_folder: ""
performance:
  gc_between_blocks: true
  gc_between_files: true
  max_concurrent_files: 1
# Retrieval and ranking parameters
retrieval:
  hybrid_search: true
  min_chunks: 1
  min_score: 0.1
  reranker_enabled: false
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  reranker_top_n: 20
  rrf_k: 60
  top_k: 5
# Security and compliance settings
security:
  audit_logging: true
  pii_sanitization: true
setup_complete: true
# RETIRED (Session 15): transformers_llm requires torch + HuggingFace (removed).
# Use ollama section above for local LLM inference.
# Kept for config schema compatibility -- TransformersRouter degrades gracefully.
transformers_llm:
  device_map: auto
  enabled: false
  load_in_4bit: true
  max_new_tokens: 2048
  model: microsoft/phi-4
  temperature: 0.05
  trust_remote_code: false
vllm:
  base_url: http://localhost:8000
  context_window: 16384
  enabled: false
  model: phi4:14b-q4_K_M
  timeout_seconds: 120
